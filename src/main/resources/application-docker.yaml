spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

tour-api:
  base-url: https://apis.data.go.kr
  service-key: ${TOUR_API_SERVICE_KEY:}
  mobile-os: ETC
  mobile-app: GangwonCompanion
  area-code: 32

destination-sync:
  enabled: true
  cron: "0 0 2 * * *"
  zone: Asia/Seoul

destination-detail-sync:
  enabled: true
  cron: "0 0 3 * * *"
  zone: Asia/Seoul
  limit: 50
