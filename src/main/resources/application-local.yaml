spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:gangwon}
    username: ${POSTGRES_USER:gangwon_user}
    password: ${POSTGRES_PASSWORD:qwer1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:gangwon_jwt_secret_key_2024_very_long_string}

activity:
  sync:
    enabled: ${ACTIVITY_SYNC_ENABLED:true}
    initial-delay-ms: 5000
    interval-ms: 86400000
    rows-per-page: 200
    max-pages: 3
  detail-refresh-days: 7
