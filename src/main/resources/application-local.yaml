spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:gangwon}
    username: ${POSTGRES_USER:gangwon_user}
    password: ${POSTGRES_PASSWORD:qwer1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:gangwon_jwt_secret_key_2024_very_long_string}

tour-api:
  base-url: https://apis.data.go.kr
  service-key: ${TOUR_API_SERVICE_KEY:}
  mobile-os: ETC
  mobile-app: GangwonCompanion
  area-code: 32

destination-sync:
  enabled: true
  cron: "0 0 2 * * *"
  zone: Asia/Seoul

destination-detail-sync:
  enabled: true
  cron: "0 0 3 * * *"
  zone: Asia/Seoul
  limit: 50

activity:
  sync:
    enabled: ${ACTIVITY_SYNC_ENABLED:true}
    initial-delay-ms: 5000
    interval-ms: 86400000
    rows-per-page: 200
    max-pages: 3
  detail-refresh-days: 7
external:
  tour-api:
    service-key: ${TOUR_API_KEY}
    base-url: https://apis.data.go.kr/B551011/KorService2
  tats-cnctr-rate:
    service-key: ${TATS_CNCTR_RATE_KEY:${TOUR_API_KEY:}}
    base-url: https://apis.data.go.kr/B551011/TatsCnctrRateService
