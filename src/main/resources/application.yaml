spring:
  application:
    name: gangwon-companion
  profiles:
    active: local

jwt:
  secret: ${JWT_SECRET:gangwon_jwt_secret_key_2024_very_long_string}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:gangwon}
    username: ${POSTGRES_USER:gangwon_user}
    password: ${POSTGRES_PASSWORD:qwer1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect